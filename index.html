<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gabrielle LeChupette</title>
    <style>
        /* CUEVA OSCURA */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }

        /* HUECO PARA MIRAR DIBUJO */
        #mask {
            /* RECORTE: 1048x640 para que la linea blanca quede afuera */
            width: 1048px; 
            height: 640px; 
            overflow: hidden;
            position: relative;
            border: 2px solid #111;
            background-color: #000;
            /* Soporte para que se achique en el celu */
            transform-origin: center;
        }

        /* DIBUJO QUE SE MUEVE ATRAS */
        #sprite-layer {
            position: absolute;
            /* LINK DE LA COSA JPEG QUE ME DA IMGUR */
            background-image: url('https://i.imgur.com/GN17nyJ.jpeg');
            background-repeat: no-repeat;
            
            /* TAMAÑO DE TODA LA PORQUERÍA (X3) */
            background-size: 7350px 3852px; 
            width: 7350px;
            height: 3852px;
            
            image-rendering: crisp-edges;
            /* EMPUJE: Metemos el dibujo 1px adentro de la mascara */
            left: -1px; top: -1px;
            will-change: transform;
        }
    </style>
</head>
<body>

    <div id="mask">
        <div id="sprite-layer"></div>
    </div>

    <script>
        const mask = document.getElementById('mask');
        const layer = document.getElementById('sprite-layer');
        /* MUCHAS GABIS */
        const TOTAL_FRAMES = 39;
        /* FILAS  */
        const COLS = 7;
        /* MEDIDAS  */
        const FW = 1050; 
        const FH = 642; 

        /* 1. AUTO-ESCALADO PARA MÓVIL */
        function ajustarEscala() {
            const scale = (window.innerWidth * 0.95) / 1050;
            if (scale < 1) {
                mask.style.transform = `scale(${scale})`;
            } else {
                mask.style.transform = `scale(1)`;
            }
        }
        window.addEventListener('resize', ajustarEscala);
        ajustarEscala();

        /* 2. FUNCIÓN DE MOVIMIENTO UNIFICADA */
        function moverGabi(clientX) {
            const percent = clientX / window.innerWidth;
            const frameIndex = Math.floor(percent * (TOTAL_FRAMES - 1));
            
            const col = frameIndex % COLS;
            const row = Math.floor(frameIndex / COLS);
            
            const x = col * FW;
            const y = row * FH;
            
            /* MOVER PARA QUE NO SE VEA MUESCA FEA DE ABAJO */
            layer.style.transform = `translate(-${x}px, -${y}px)`;
        }

        /* CUANDO MOVER MANO CON RATON */
        window.addEventListener('mousemove', (e) => moverGabi(e.clientX));

        /* SOPORTE PARA DEDO (CELULAR) */
        window.addEventListener('touchstart', (e) => moverGabi(e.touches[0].clientX), { passive: false });
        window.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Bloquea el scroll para que Gabi deslice
            moverGabi(e.touches[0].clientX);
        }, { passive: false });

        /* Te vas a acordar de mí
        (Aquí va tu arte ASCII del beso que ya tenés)
        */
    </script>
</body>
</html>
